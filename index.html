<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KACH Weddings · Tidslinje</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ECEAE6;          /* warm light grey – matches the logo background */
    --surface:#F6F4F1;     /* card surface */
    --ink:#1A1816;         /* near-black, for serif display */
    --ink-soft:#3A3733;
    --muted:#6B675F;       /* warm grey, secondary text — WCAG AA (~4.8:1 on bg) */
    --hairline:#D8D4CD;    /* decorative dividers only */
    --field-border:#8C877E;/* interactive field borders — WCAG 1.4.11 (~3.5:1) */
    --line:#C9C4BC;        /* timeline rail */
    --accent:#1A1816;      /* monochrome accent (filled marker) */
    --serif:"Cormorant Garamond", "Georgia", serif;
    --sans:"Montserrat", -apple-system, "Helvetica Neue", Arial, sans-serif;
  }

  *{box-sizing:border-box;margin:0;padding:0;}
  html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  body{
    background:var(--bg);
    color:var(--ink-soft);
    font-family:var(--sans);
    font-weight:300;
    line-height:1.7;
    padding:48px 20px 96px;
  }

  .wrap{max-width:860px;margin:0 auto;}

  /* ---------- Header / wordmark ---------- */
  header{text-align:center;margin-bottom:44px;}
  .wordmark{
    font-family:var(--serif);
    font-weight:400;
    font-size:clamp(22px,3.6vw,32px);
    letter-spacing:.18em;
    color:var(--ink);
    line-height:1;
  }
  .wordmark .light{font-weight:300;}
  .eyebrow{
    font-family:var(--sans);
    font-size:11px;
    font-weight:400;
    letter-spacing:.26em;
    text-transform:uppercase;
    color:var(--muted);
    margin-top:12px;
  }

  /* ---------- Controls ---------- */
  .controls{
    background:var(--surface);
    border:1px solid var(--hairline);
    border-radius:2px;
    padding:30px 30px 26px;
    margin-bottom:56px;
  }
  .controls-title{
    font-family:var(--sans);
    font-size:11px;letter-spacing:.3em;text-transform:uppercase;
    color:var(--muted);margin-bottom:22px;
  }
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px 24px;}
  .field{display:flex;flex-direction:column;}
  .field.full{grid-column:1 / -1;}
  label{
    font-size:11px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--muted);margin-bottom:8px;
  }
  input[type="text"],input[type="date"],input[type="number"]{
    font-family:var(--sans);font-weight:300;font-size:15px;color:var(--ink);
    background:#fff;border:1px solid var(--field-border);border-radius:2px;
    padding:11px 13px;width:100%;
  }
  input::placeholder{color:#6B675F;opacity:1;}
  input:focus{outline:2px solid var(--ink);outline-offset:1px;border-color:var(--ink);}
  button:focus-visible,.toggle input:focus-visible,a:focus-visible{outline:2px solid var(--ink);outline-offset:2px;}
  .sub-label{font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--muted);padding-top:14px;border-top:1px solid var(--hairline);}
  .toggles{display:flex;flex-wrap:wrap;gap:18px 26px;margin-top:6px;}
  .toggle{display:flex;align-items:center;gap:9px;cursor:pointer;font-size:13px;color:var(--ink-soft);}
  .toggle input{width:16px;height:16px;accent-color:var(--ink);cursor:pointer;}
  .actions{margin-top:24px;display:flex;gap:14px;flex-wrap:wrap;}
  button{
    font-family:var(--sans);font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    cursor:pointer;border-radius:2px;padding:13px 26px;transition:.18s ease;
  }
  .btn-primary{background:var(--ink);color:#fff;border:1px solid var(--ink);}
  .btn-primary:hover{background:#000;}
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--field-border);}
  .btn-ghost:hover{border-color:var(--ink);}

  /* ---------- Timeline header ---------- */
  .tl-head{text-align:center;margin-bottom:52px;}
  .tl-head .couple{
    font-family:var(--serif);font-weight:300;
    font-size:clamp(40px,7vw,60px);color:var(--ink);line-height:1.05;
  }
  .tl-head .meta{
    font-size:12px;letter-spacing:.28em;text-transform:uppercase;
    color:var(--muted);margin-top:16px;
  }
  .tl-head .rule{width:46px;height:1px;background:var(--ink);margin:26px auto 0;}

  /* ---------- Timeline ---------- */
  .timeline{position:relative;}
  .timeline::before{
    content:"";position:absolute;left:7px;top:8px;bottom:8px;width:1px;background:var(--line);
  }
  .phase-label{
    position:relative;padding-left:48px;margin:42px 0 18px;
    font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);
  }
  .phase-label:first-child{margin-top:0;}

  .item{position:relative;padding:0 0 34px 48px;}
  .item .marker{
    position:absolute;left:0;top:5px;width:15px;height:15px;border-radius:50%;
    background:var(--bg);border:1px solid var(--ink);
  }
  .item.is-day .marker{background:var(--ink);}
  .item.is-past .marker{border-color:var(--line);background:var(--bg);}

  .item .date{
    font-family:var(--serif);font-weight:400;
    font-size:clamp(22px,3.4vw,30px);color:var(--ink);line-height:1.1;
  }
  .item .weekday{
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);
    margin-top:4px;margin-bottom:12px;
  }
  .item.is-booking .date{font-size:clamp(20px,3vw,26px);}
  .item.is-soft .date{font-size:clamp(19px,2.8vw,24px);}
  .item .tag{
    display:inline-block;font-size:10px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--muted);border:1px solid var(--hairline);border-radius:2px;
    padding:3px 9px;margin-bottom:10px;
  }
  .item.is-day .tag{color:var(--ink);border-color:var(--ink);}
  .item .title{
    font-family:var(--serif);font-weight:500;font-size:21px;color:var(--ink);
    line-height:1.25;margin-bottom:7px;
  }
  .item .desc{font-size:14.5px;color:var(--ink-soft);max-width:60ch;}
  .item .desc .who{color:var(--muted);font-style:italic;display:block;margin-top:6px;font-size:13px;}
  .item.is-day .title{font-size:26px;}

  /* ---------- Off-rail feature-kort (parfoto / album) ---------- */
  .aside{
    position:relative;            /* dekker rail-linjen → ligger «ved siden av» */
    background:var(--surface);
    border:1px solid var(--hairline);
    border-radius:2px;
    padding:15px 20px;
    margin:4px 0 26px;
  }
  .aside .a-eyebrow{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
  .aside .a-title{font-family:var(--serif);font-weight:500;font-size:19px;color:var(--ink);line-height:1.25;margin-bottom:6px;}
  .aside .a-desc{font-size:13.5px;color:var(--muted);max-width:60ch;}
  .aside .a-seasons{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:12px;}
  .aside .a-seasons-label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-right:2px;}
  .aside .a-season{
    font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);
    border:1px solid var(--field-border);border-radius:2px;padding:4px 11px;
  }
  .aside .a-note{font-size:12px;color:var(--ink-soft);margin-top:8px;}

  /* ---------- Footer ---------- */
  footer{text-align:center;margin-top:64px;padding-top:32px;border-top:1px solid var(--hairline);}
  footer .sig{font-family:var(--serif);font-style:italic;font-size:18px;color:var(--ink);}
  footer .links{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);margin-top:12px;}

  .empty{text-align:center;color:var(--muted);font-style:italic;font-family:var(--serif);font-size:20px;padding:50px 0;}

  @media (max-width:560px){
    .grid{grid-template-columns:1fr;}
    body{padding:32px 16px 72px;}
  }

  /* ---------- Print / Lagre som PDF ---------- */
  @media print{
    body{
      background:#fff;padding:0;color:#000;
      -webkit-print-color-adjust:exact;print-color-adjust:exact;
    }
    .controls,.actions,.no-print{display:none !important;}
    header{margin-bottom:26px;}
    .tl-head{margin-bottom:34px;}
    .timeline::before{background:#bbb;}
    /* Ikke del milepæler, kort eller bunntekst over to sider */
    .item,.aside,footer,.tl-head{break-inside:avoid;page-break-inside:avoid;}
    .phase-label{break-after:avoid;page-break-after:avoid;}
    .item .marker{border-color:#000;}
    .item.is-day .marker{background:#000;}
    .aside{background:#f4f2ef;}
    footer{margin-top:40px;}
    @page{margin:16mm;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1 class="wordmark">KACH <span class="light">Weddings</span></h1>
    <div class="eyebrow">Tidslinje for planlegging av bryllupsfotografering</div>
  </header>

  <!-- Controls -->
  <section class="controls no-print" aria-label="Innstillinger">
    <div class="controls-title">Sett opp tidslinjen</div>
    <div class="grid">
      <div class="field full">
        <label for="couple">Brudeparets navn (valgfritt)</label>
        <input type="text" id="couple" placeholder="f.eks. Ingrid &amp; Markus">
      </div>
      <div class="field">
        <label for="wdate">Bryllupsdato</label>
        <input type="date" id="wdate">
      </div>
      <div class="field">
        <label for="bdate">Bestillingsdato (valgfritt)</label>
        <input type="date" id="bdate">
      </div>
      <div class="field">
        <label for="place">Sted (valgfritt)</label>
        <input type="text" id="place" placeholder="f.eks. Bergen">
      </div>
      <div class="field">
        <label for="delw">Levering av galleri (uker etter)</label>
        <input type="number" id="delw" value="4" min="1" max="20">
      </div>
      <div class="field full"><div class="sub-label">Sluttbetaling (faktureres etter bryllupet)</div></div>
      <div class="field">
        <label for="sendDays">Faktura sendes (dager etter bryllupet)</label>
        <input type="number" id="sendDays" value="1" min="0" max="60">
      </div>
      <div class="field">
        <label for="termDays">Forfall (dager etter faktura)</label>
        <input type="number" id="termDays" value="10" min="1" max="60">
      </div>
      <div class="field">
        <label for="finalOverride">Egendefinert forfallsdato (valgfritt)</label>
        <input type="date" id="finalOverride">
      </div>
      <div class="field full">
        <div class="toggles">
          <label class="toggle"><input type="checkbox" id="tEngage"> Parfotografering inkludert i pakken</label>
          <label class="toggle"><input type="checkbox" id="tAlbum"> Bryllupsalbum inkludert i pakken</label>
        </div>
      </div>
    </div>
    <div class="actions">
      <button class="btn-primary" id="genBtn">Oppdater tidslinje</button>
      <button class="btn-ghost" id="csvBtn">Eksporter til Canva (CSV)</button>
      <button class="btn-ghost" id="pdfBtn">Eksporter som PDF</button>
      <button class="btn-ghost" id="resetBtn">Tilbakestill</button>
    </div>
  </section>

  <!-- Output -->
  <section id="output"></section>

</div>

<script>
const $ = id => document.getElementById(id);

// Milestone blueprint. offset is in days relative to the wedding date (W).
// type: 'booking' (no fixed date) | 'rel' (relative to W) | 'final' | 'delivery' | 'delivery+'
const PHASES = [
  { name:"Velkommen", items:[
    { key:"welcome", type:"booking", tag:"Oppstart", title:"Velkommen til KACH Weddings",
      desc:"Dato og avtale er bekreftet, og dere er offisielt en del av KACH Weddings. Jeg gleder meg til å bli kjent med dere og til å fortelle historien deres.",
      who:"KACH Weddings tar kontakt innen 48 timer etter at kontrakten er signert." },
    { key:"getToKnow", type:"booking", tag:"Spørreskjema", dateLabel:"Etter bestilling", weekday:"Innen en uke",
      title:"La oss bli kjent",
      desc:"Et lite spørreskjema så jeg kan bli ordentlig kjent med dere: historien deres, hva som betyr noe, og stilen deres. Jo bedre jeg kjenner dere, jo mer «dere» blir bildene.",
      who:"KACH Weddings sender skjemaet kort tid etter bestillingen." },
  ]},
  { name:"Planlegging", items:[
    { key:"timelineQ", type:"rel", tag:"Spørreskjema", title:"Kjøreplanskjema",
      desc:"Et spørreskjema med de praktiske detaljene rundt selve dagen: tider, steder, kontaktpersoner og program. Det danner grunnlaget for kjøreplanen vi lager sammen.",
      who:"KACH Weddings sender det alltid den 1. i måneden, så dere kan fylle ut i ro og mak." },
    { key:"plancall", type:"rel", tag:"Planlegging", title:"Planleggingssamtale",
      desc:"Vi tar en prat og går gjennom hele dagen: kjøreplan, ønskeliste, familiebilder og hvilke bilder som betyr mest for dere.",
      who:"Omtrent en uke etter skjemaet. Vi avtaler tidspunkt sammen." },
  ]},
  { name:"Før dagen", items:[
    { key:"finalSync", type:"rel", offset:-10, tag:"Bekreftelse", title:"Siste gjennomgang",
      desc:"En siste gjennomgang før dagen: vi bekrefter kjøreplan, adresser, kontaktpersoner og en reserveplan for været. Da er alt klart, og dere kan bare glede dere.",
      who:"KACH Weddings tar kontakt." },
  ]},
  { name:"Selve dagen", items:[
    { key:"day", type:"rel", offset:0, tag:"Bryllupsdagen", isDay:true, title:"Bryllupsdagen",
      desc:"Vi er der gjennom hele dagen og fanger historien deres slik den utspiller seg, uanstrengt og ekte.",
      who:"" },
  ]},
  { name:"Etter dagen", items:[
    { key:"sneak", type:"rel", offset:3, tag:"Levering", title:"Smakebit",
      desc:"Et lite utvalg bilder mens følelsen fortsatt sitter i kroppen, perfekt for de første takkehilsenene.",
      who:"KACH Weddings sender." },
    { key:"final", type:"final", tag:"Betaling", title:"Sluttbetaling forfaller",
      desc:"", who:"" },
    { key:"gallery", type:"delivery", tag:"Levering", title:"Ferdig galleri",
      desc:"Det ferdige bildegalleriet leveres. Historien deres, fortalt fra start til slutt, klar til å lastes ned og deles.",
      who:"KACH Weddings leverer i et nettgalleri dere kan laste ned fra." },
    { key:"thanks", type:"delivery+", offset:7, tag:"Avslutning", title:"Takk for tilliten",
      desc:"Tusen takk for at jeg fikk dele dagen deres. Ble dere glade i bildene, setter jeg umåtelig stor pris på noen ord eller en anmeldelse. Det betyr alt for oss i KACH Weddings.",
      who:"KACH Weddings tar kontakt." },
  ]},
];

function addDays(date, days){
  const d = new Date(date.getTime());
  d.setDate(d.getDate() + days);
  return d;
}
function fmtDate(d){
  let s = d.toLocaleDateString('nb-NO', { day:'numeric', month:'long', year:'numeric' });
  return s.charAt(0).toUpperCase() + s.slice(1);
}
function fmtWeekday(d){
  return d.toLocaleDateString('nb-NO', { weekday:'long' }).toUpperCase();
}

// ---------- Norske offentlige helligdager (intern liste) ----------
// Faste: 1. jan, 1. mai, 17. mai, 25. + 26. des.
// Bevegelige (påske-/pinsebaserte): skjærtorsdag, langfredag, 1. + 2. påskedag,
// Kristi himmelfartsdag, 1. + 2. pinsedag.
function easterSunday(year){
  const a=year%19, b=Math.floor(year/100), c=year%100;
  const d=Math.floor(b/4), e=b%4, f=Math.floor((b+8)/25), g=Math.floor((b-f+1)/3);
  const h=(19*a+b-d-g+15)%30, i=Math.floor(c/4), k=c%4;
  const l=(32+2*e+2*i-h-k)%7, m=Math.floor((a+11*h+22*l)/451);
  const month=Math.floor((h+l-7*m+114)/31);
  const day=((h+l-7*m+114)%31)+1;
  return new Date(year, month-1, day);
}
const _holidayCache = {};
function _key(d){ return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
function holidaySet(year){
  if(_holidayCache[year]) return _holidayCache[year];
  const s = new Set();
  const add = dt => s.add(_key(dt));
  add(new Date(year,0,1));    // Første nyttårsdag
  add(new Date(year,4,1));    // Arbeidernes dag
  add(new Date(year,4,17));   // Grunnlovsdag
  add(new Date(year,11,25));  // Første juledag
  add(new Date(year,11,26));  // Andre juledag
  const e = easterSunday(year);
  [-3,-2,0,1,39,49,50].forEach(off => add(addDays(e, off)));
  _holidayCache[year] = s;
  return s;
}
function isHoliday(d){ return holidaySet(d.getFullYear()).has(_key(d)); }
// Flytt fremover til første dato som ikke er helligdag.
function bumpForward(d){
  let x = new Date(d.getTime());
  while(isHoliday(x)) x = addDays(x, 1);
  return x;
}

function esc(s){
  return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function monthStartBefore(W, months){
  return new Date(W.getFullYear(), W.getMonth() - months, 1);
}

function computeDate(item, W, sendDays, termDays, delDays){
  if(item.type === 'booking' || item.type === 'season' || item.type === 'open') return null;
  if(item.isDay) return W; // bryllupsdagen flyttes aldri
  // Kjøreplan-skjema sendes alltid den 1. i måneden, ca. 3 mnd før — samtalen 1 uke etter.
  if(item.key === 'timelineQ') return bumpForward(monthStartBefore(W, 3));
  if(item.key === 'plancall')  return bumpForward(addDays(monthStartBefore(W, 3), 7));
  if(item.type === 'final'){
    const ov = $('finalOverride').value;
    if(ov){ const p = ov.split('-'); return new Date(+p[0], +p[1]-1, +p[2]); } // egendefinert: flyttes ikke
    return bumpForward(addDays(W, sendDays + termDays));
  }
  if(item.type === 'delivery')   return bumpForward(addDays(W, delDays));
  if(item.type === 'delivery+')  return bumpForward(addDays(W, delDays + (item.offset||0)));
  return bumpForward(addDays(W, item.offset));
}

// Single source of truth — used by both the on-screen timeline and the CSV export.
function getMilestones(){
  const val = $('wdate').value;
  if(!val) return null;
  const parts = val.split('-');
  const W = new Date(+parts[0], +parts[1]-1, +parts[2]);
  const today = new Date(); today.setHours(0,0,0,0);

  const sendDays = (+$('sendDays').value || 0);
  const termDays = (+$('termDays').value || 0);
  const delDays  = (+$('delw').value || 4) * 7;

  const rows = [];
  PHASES.forEach(phase => {
    phase.items.forEach(it => {
      if(it.optional && !$(it.optional).checked) return;
      const d = computeDate(it, W, sendDays, termDays, delDays);
      const isBooking = it.type === 'booking';
      const isSoft = (it.type === 'season' || it.type === 'open');

      let descText = it.desc, whoText = it.who, tag = it.tag;
      let dateLabel, weekday;

      if(isBooking){
        dateLabel = it.dateLabel || 'Ved signering';
        weekday   = it.weekday   || 'Med en gang';
      } else {
        if(it.key === 'final'){
          if($('finalOverride').value){
            descText = 'Restbeløpet betales på den avtalte datoen.';
            whoText  = 'Egen forfallsdato.';
          } else {
            const sent = addDays(W, sendDays);
            const when = sendDays === 0 ? 'på bryllupsdagen'
                       : sendDays === 1 ? 'dagen etter bryllupet'
                       : `${sendDays} dager etter bryllupet`;
            descText = `Restbeløpet betales. Fakturaen sendes ${when}, med ${termDays} dagers betalingsfrist.`;
            whoText  = `Fakturaen sendes ${fmtDate(sent)}.`;
          }
        }
        dateLabel = fmtDate(d); weekday = fmtWeekday(d);
      }

      rows.push({
        key: it.key,
        phase: phase.name,
        tag: tag,
        dateLabel: dateLabel,
        weekday: weekday,
        title: it.title,
        desc: descText,
        who: whoText,
        isDay: !!it.isDay,
        isBooking: isBooking,
        isSoft: isSoft,
        isPast: d && d < today && !it.isDay
      });
    });
  });
  return { W, rows };
}

// Off-rail «feature»-kort — subtilt vevd inn, men tydelig som valgfritt tillegg når det ikke er inkludert.
function parfotoAside(){
  const inc = $('tEngage').checked;
  const a = {
    included: inc,
    title: 'Parfotografering',
    eyebrow: inc ? 'Inkludert i pakken' : 'Valgfritt tillegg',
    desc: inc
      ? 'En egen fotoøkt for dere to, en rolig måte å bli trygg foran kamera på. Vi finner et fint tidspunkt sammen.'
      : 'En egen fotoøkt for dere to i løpet av høsten eller våren før bryllupet, en rolig måte å bli trygg foran kamera på.',
    note: inc ? '' : 'Kommer i tillegg til pakkeprisen.',
    seasons: null
  };
  if(inc){
    const seasons = ['Høst','Vår'];
    const wv = $('wdate').value, bv = $('bdate').value;
    if(wv){
      const wp = wv.split('-');
      const W = new Date(+wp[0], +wp[1]-1, +wp[2]);
      let B;
      if(bv){ const bp = bv.split('-'); B = new Date(+bp[0], +bp[1]-1, +bp[2]); }
      else { B = new Date(); B.setHours(0,0,0,0); } // ingen bookingdato → bruk dagens dato
      const cutoff = new Date(W.getFullYear()-1, 5, 1); // 1. juni året før bryllupet
      if(B < cutoff) seasons.unshift('Sommer'); // tidlig booking → sommer også aktuelt
    }
    a.seasons = seasons;
  }
  return a;
}
function albumAside(){
  const inc = $('tAlbum').checked;
  return {
    included: inc,
    title: 'Bryllupsalbum',
    eyebrow: inc ? 'Inkludert i pakken' : 'Valgfritt tillegg',
    desc: 'Når galleriet er klart, kan favorittene deres samles i et håndlaget album, historien deres i fysisk form.',
    note: inc ? '' : 'Kommer i tillegg til pakkeprisen.',
    seasons: null
  };
}
function asideHTML(a){
  const note = a.note ? `<div class="a-note">${esc(a.note)}</div>` : '';
  let seasons = '';
  if(a.seasons && a.seasons.length){
    seasons = '<div class="a-seasons"><span class="a-seasons-label">Aktuelle årstider</span>'
      + a.seasons.map(s => `<span class="a-season">${esc(s)}</span>`).join('')
      + '</div>';
  }
  return `<div class="aside${a.included ? '' : ' is-extra'}">
    <div class="a-eyebrow">${esc(a.eyebrow)}</div>
    <div class="a-title">${esc(a.title)}</div>
    <div class="a-desc">${esc(a.desc)}</div>
    ${seasons}
    ${note}
  </div>`;
}

function render(){
  const out = $('output');
  const data = getMilestones();
  if(!data){ out.innerHTML = '<p class="empty">Velg en bryllupsdato for å se tidslinjen.</p>'; return; }

  const couple = $('couple').value.trim();
  const place  = $('place').value.trim();

  let html = '<div class="tl-head">';
  html += `<h2 class="couple">${couple ? esc(couple) : 'Deres tidslinje'}</h2>`;
  const metaBits = [fmtDate(data.W)];
  if(place) metaBits.push(esc(place));
  html += `<div class="meta">${metaBits.join(' · ')}</div><div class="rule"></div></div>`;

  html += '<div class="timeline">';
  let lastPhase = null;
  data.rows.forEach(r => {
    if(r.phase !== lastPhase){
      html += `<h3 class="phase-label">${esc(r.phase)}</h3>`;
      lastPhase = r.phase;
      // Parfoto vevd inn øverst i planleggingsfasen — off-rail.
      if(r.phase === 'Planlegging') html += asideHTML(parfotoAside());
    }
    const cls = ['item'];
    if(r.isDay) cls.push('is-day');
    if(r.isBooking) cls.push('is-booking');
    if(r.isSoft) cls.push('is-soft');
    if(r.isPast) cls.push('is-past');
    html += `<div class="${cls.join(' ')}">
      <span class="marker"></span>
      <span class="tag">${esc(r.tag)}</span>
      <div class="date">${esc(r.dateLabel)}</div><div class="weekday">${esc(r.weekday)}</div>
      <div class="title">${esc(r.title)}</div>
      <div class="desc">${esc(r.desc)}${r.who ? `<span class="who">${esc(r.who)}</span>` : ''}</div>
    </div>`;
    // Album vevd inn rett etter levering — off-rail.
    if(r.key === 'gallery') html += asideHTML(albumAside());
  });
  html += '</div>';

  html += `<footer>
    <div class="sig">Gleder meg til å forevige deres store dag</div>
    <div class="links">www.kachweddings.no</div>
  </footer>`;

  out.innerHTML = html;
}

// ---------- Canva / Bulk Create export ----------
function csvCell(v){ return '"' + String(v==null?'':v).replace(/"/g,'""') + '"'; }

function downloadCSV(){
  const data = getMilestones();
  if(!data){ alert('Velg en bryllupsdato først.'); return; }

  const couple = $('couple').value.trim();
  const place  = $('place').value.trim();
  const wdate  = fmtDate(data.W);

  const header = ['Brudepar','Bryllupsdato','Sted','Fase','Tag','Dato','Ukedag','Tittel','Beskrivelse','Detalj'];
  const lines = [header];
  data.rows.forEach(r => {
    lines.push([couple, wdate, place, r.phase, r.tag, r.dateLabel, r.weekday, r.title, r.desc, r.who]);
  });
  const pf = parfotoAside(), al = albumAside();
  const statusDetail = a => a.included
    ? ('Inkludert i pakken' + (a.seasons && a.seasons.length ? ' · Aktuelle årstider: ' + a.seasons.join(', ') : ''))
    : 'Valgfritt tillegg som koster ekstra';
  lines.push([couple, wdate, place, 'Planlegging', pf.included ? 'Inkludert' : 'Valgfritt tillegg', '', '', pf.title, pf.desc, statusDetail(pf)]);
  lines.push([couple, wdate, place, 'Etter dagen', al.included ? 'Inkludert' : 'Valgfritt tillegg', '', '', al.title, al.desc, statusDetail(al)]);

  const csv = lines.map(row => row.map(csvCell).join(',')).join('\r\n');
  // BOM so Canva/Excel reads æ ø å correctly
  const blob = new Blob(['\ufeff' + csv], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const safe = (couple || 'kach-weddings').toLowerCase()
                 .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  a.href = url;
  a.download = `kach-weddings-tidslinje-${safe}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ---------- Eksporter som PDF ----------
// Hovedmetode: lag et bilde som er identisk med tidslinjen på skjermen ved å rasterisere
// selve DOM-en via SVG (helt uten eksterne bibliotek). Klarer ikke nettleseren det
// (f.eks. Safari, eller streng sandkasse), faller vi tilbake til en vektor-tegning av designet.
async function exportPDF(){
  const data = getMilestones();
  if(!data){ alert('Velg en bryllupsdato først.'); return; }
  const couple = $('couple').value.trim();
  const btn = $('pdfBtn'); const prevLabel = btn ? btn.textContent : '';
  if(btn){ btn.disabled = true; btn.textContent = 'Eksporterer …'; }
  let bytes = null;
  try { bytes = await withTimeout(rasterPDFBytes(), 4000); } catch(e){ bytes = null; }
  if(!bytes){ try { bytes = vectorPDFBytes(); } catch(e){ bytes = null; } }
  if(btn){ btn.disabled = false; btn.textContent = prevLabel; }
  if(!bytes){ alert('Kunne ikke lage PDF her. Åpne fila i nettleseren din og prøv igjen.'); return; }
  deliverPDF(bytes, couple);
}

function pdfStringToBytes(pdf){
  const b = new Uint8Array(pdf.length);
  for(let i=0;i<pdf.length;i++) b[i] = pdf.charCodeAt(i) & 0xff;
  return b;
}

// Tidsavbrudd, så et tregt/blokkert nettverkskall ikke kan fryse eksporten.
function withTimeout(promise, ms){
  return Promise.race([
    promise,
    new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), ms))
  ]);
}

function deliverPDF(bytes, couple){
  const blob = new Blob([bytes], { type:'application/pdf' });
  const url = URL.createObjectURL(blob);
  const safe = (couple || 'kach-weddings').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  const fname = `kach-weddings-tidslinje-${safe}.pdf`;
  try {
    const a = document.createElement('a');
    a.href = url; a.download = fname;
    document.body.appendChild(a); a.click(); a.remove();
  } catch(e){ /* nedlasting kan være blokkert i sandkassen */ }
  showPdfOverlay(url, fname);
}

// Bygg inn skriftene som data-URI så rasteriseringen bruker Cormorant + Montserrat
// (ellers faller SVG-en tilbake til system-serif). Feiler stille hvis nettet er sperret.
async function embedFontsCSS(){
  const cssUrl = 'https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400;500&display=swap';
  const css = await (await fetch(cssUrl)).text();
  const urls = Array.from(new Set(Array.from(css.matchAll(/url\((https:\/\/[^)]+\.woff2)\)/g)).map(m=>m[1])));
  const map = {};
  await Promise.all(urls.map(async u=>{
    const buf = await (await fetch(u)).arrayBuffer();
    const arr = new Uint8Array(buf); let bin = '';
    for(let i=0;i<arr.length;i++) bin += String.fromCharCode(arr[i]);
    map[u] = btoa(bin);
  }));
  return css.replace(/url\((https:\/\/[^)]+\.woff2)\)/g, (m,u)=> map[u] ? `url(data:font/woff2;base64,${map[u]})` : m);
}

function isUniform(data){
  const r=data[0], g=data[1], b=data[2];
  for(let i=0;i<data.length;i+=4000){
    if(Math.abs(data[i]-r)>4 || Math.abs(data[i+1]-g)>4 || Math.abs(data[i+2]-b)>4) return false;
  }
  return true;
}

// Rasteriser selve tidslinjen (DOM → SVG → bilde) og pakk den i en PDF. Identisk med skjermen.
async function rasterPDFBytes(){
  render();
  const src = document.querySelector('.wrap');
  if(!src) throw new Error('mangler innhold');
  const width = 800;
  const clone = src.cloneNode(true);
  const ctrl = clone.querySelector('.controls'); if(ctrl) ctrl.remove();
  clone.style.width = width+'px'; clone.style.maxWidth = width+'px';
  clone.style.margin = '0'; clone.style.padding = '70px 68px';
  clone.classList.add('pdfcap');

  // Balansert rytme – gjelder bare PDF-fangsten, ikke skjermen.
  // Små avstander INNI en milepæl holdes lave, store avstander MELLOM blokker holdes høye,
  // slik at sideskift trygt kan legges i mellomrommene uten å dele en milepæl.
  const captureCSS = `
    .pdfcap header{margin-bottom:30px}
    .pdfcap .tl-head{margin-bottom:50px}
    .pdfcap .phase-label{margin:46px 0 18px}
    .pdfcap .phase-label:first-child{margin-top:6px}
    .pdfcap .item{padding-bottom:40px}
    .pdfcap .item .tag{margin-bottom:10px}
    .pdfcap .item .date{margin-bottom:2px}
    .pdfcap .item .weekday{margin-bottom:12px}
    .pdfcap .item .title{margin-bottom:9px}
    .pdfcap .item .desc{line-height:1.6}
    .pdfcap .aside{margin:12px 0 40px;padding:22px 26px}
    .pdfcap footer{margin-top:56px;padding-top:34px}
  `;

  const holder = document.createElement('div');
  holder.style.cssText = `position:fixed;left:-99999px;top:0;width:${width}px;background:#ECEAE6;`;
  const capStyle = document.createElement('style');
  capStyle.textContent = captureCSS;     // samme rytme når vi måler høyden som når vi tegner
  holder.appendChild(capStyle);
  holder.appendChild(clone);
  document.body.appendChild(holder);

  let fontCSS = '';
  try { fontCSS = await withTimeout(embedFontsCSS(), 2000); } catch(e){ fontCSS = ''; }

  const scale = 2;
  const styleEl = document.querySelector('style');
  const cssText = styleEl ? styleEl.textContent : '';
  const W = Math.ceil(clone.offsetWidth || width);
  const H = Math.ceil(clone.offsetHeight);
  const xml = new XMLSerializer().serializeToString(clone);

  if(holder.parentNode) holder.parentNode.removeChild(holder);
  if(!H) throw new Error('tom høyde');

  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}">`
    + `<foreignObject x="0" y="0" width="100%" height="100%">`
    + `<div xmlns="http://www.w3.org/1999/xhtml" style="width:${W}px;background:#ECEAE6;">`
    + `<style>${fontCSS}${cssText}${captureCSS}</style>${xml}</div></foreignObject></svg>`;

  const img = new Image();
  await withTimeout(new Promise((res,rej)=>{
    img.onload = res; img.onerror = () => rej(new Error('svg'));
    img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  }), 2500);
  // gi innebygde skrifter et øyeblikk på å være klare før vi tegner
  await new Promise(r => setTimeout(r, 60));

  const cnv = document.createElement('canvas');
  cnv.width = W*scale; cnv.height = H*scale;
  const cx = cnv.getContext('2d');
  cx.fillStyle = '#ECEAE6'; cx.fillRect(0,0,cnv.width,cnv.height);
  cx.setTransform(scale,0,0,scale,0,0);
  cx.drawImage(img,0,0,W,H);

  let pix;
  try { pix = cx.getImageData(0,0,cnv.width,cnv.height).data; }
  catch(e){ throw new Error('tainted'); }
  if(isUniform(pix)) throw new Error('blank');

  // Sideskift leses fra det faktiske bildet: en side kan bare brytes der det er en bred
  // stripe med REN bakgrunnsfarge. Det utelukker tekst, prikker, kort-flater (annen lys
  // farge) og de små mellomrommene inni en milepæl, så ingenting deles.
  const breaks = findSafeBreaks(pix, cnv.width, cnv.height);
  const contentH = contentBottom(pix, cnv.width, cnv.height); // klipp bort tomt område nederst

  return imagePDFBytes(cnv, breaks, contentH, pix);
}

// Finn brede striper med ren bakgrunn (#ECEAE6). Bare DISSE er lovlige sideskift.
function findSafeBreaks(data, W, H){
  const x0 = Math.floor(W*0.14), x1 = Math.floor(W*0.92); // hopp over skinnen til venstre
  const R=236, G=234, B=230, TOL=7;   // bakgrunn; kort-flate (#F6F4F1) ligger ~10 unna → utelukkes
  const MIN_BAND = 50;                 // bildepiksler ren bakgrunn for å telle som ekte mellomrom
  const breaks = [];
  let runStart = -1;
  for(let y=0; y<=H; y++){
    let bg = 1;
    if(y < H){
      const base = y*W*4; let bad = 0;
      for(let x=x0; x<x1; x+=3){
        const i = base + x*4;
        if(Math.abs(data[i]-R)>TOL || Math.abs(data[i+1]-G)>TOL || Math.abs(data[i+2]-B)>TOL){
          if(++bad > 2){ bg = 0; break; }   // tål litt JPEG-støy
        }
      }
    } else bg = 0;
    if(bg){ if(runStart<0) runStart = y; }
    else { if(runStart>=0 && (y-runStart)>=MIN_BAND) breaks.push(Math.floor((runStart+y)/2)); runStart = -1; }
  }
  return breaks;
}

// Siste rad med innhold (+ litt luft). Brukes til å klippe bort tomt område nederst,
// så vi unngår halvtomme sider og blanke ark på slutten.
function contentBottom(data, W, H){
  const x0 = Math.floor(W*0.05), x1 = Math.floor(W*0.95);
  for(let y=H-1; y>=0; y--){
    const base = y*W*4;
    for(let x=x0; x<x1; x+=2){
      const i = base + x*4;
      if(Math.min(data[i],data[i+1],data[i+2]) < 120) return Math.min(H, y + 18);
    }
  }
  return H;
}

// Har dette utsnittet noe innhold i det hele tatt? (For å hoppe over helt tomme sider.)
function rangeHasInk(data, W, sy, ey){
  const x0 = Math.floor(W*0.05), x1 = Math.floor(W*0.95);
  for(let y=Math.max(0,sy); y<ey; y+=2){
    const base = y*W*4;
    for(let x=x0; x<x1; x+=2){
      const i = base + x*4;
      if(Math.min(data[i],data[i+1],data[i+2]) < 120) return true;
    }
  }
  return false;
}

// Fyll hver side maksimalt: ta det største trygge bruddet som får plass. Etter at innholdet
// er blokkjustert ligger det et trygt mellomrom rett ved hver sidekant, så sidene fylles helt.
function paginate(safe, H, pageHpx){
  const s = (safe || []).filter(b => b > 0 && b < H).sort((a,b)=>a-b);
  const bounds = []; let startY = 0, guard = 0;
  while(startY < H && guard++ < 200){
    const ideal = startY + pageHpx;
    if(ideal >= H){ bounds.push(H); break; }
    let cut = -1;
    for(const b of s){ if(b > startY + 24 && b <= ideal) cut = b; }  // største trygge ≤ sidekant
    if(cut < 0) cut = ideal;                                          // ingen trygg (sjelden) → hardt
    bounds.push(cut); startY = cut;
  }
  if(bounds[bounds.length-1] !== H) bounds.push(H);
  return bounds;
}

function imagePDFBytes(cnv, breaks, contentH, pix){
  const PW=595.28, PH=841.89, M=0;          // ingen marg → bakgrunnen går helt ut til kanten
  const BG = '0.9255 0.9176 0.9020';        // #ECEAE6
  const CWpt = PW - 2*M, CHpt = PH - 2*M;
  const Wpx = cnv.width;
  const Hpx = Math.min(contentH || cnv.height, cnv.height); // bruk innholdshøyden, ikke hele lerretet
  const pxPerPt = Wpx / CWpt;
  const pageHpx = Math.max(1, Math.floor(CHpt * pxPerPt));

  // Fyll hver side maksimalt og bryt kun i trygge mellomrom (matcher blokkjusteringen over).
  const safe = (breaks || []).filter(b => b > 0 && b < Hpx).sort((a,b)=>a-b);
  const bounds = paginate(safe, Hpx, pageHpx);   // liste av kutt-Y, slutter på Hpx
  const cuts = [];
  let prev = 0;
  bounds.forEach(c => { cuts.push([prev, c]); prev = c; });

  const slices = [];
  cuts.forEach(([sy, ey])=>{
    if(ey - sy < 2) return;                              // ingen reell høyde
    if(pix && !rangeHasInk(pix, Wpx, sy, ey)) return;    // helt tom side → hopp over
    const sh = ey - sy;
    const tmp = document.createElement('canvas');
    tmp.width = Wpx; tmp.height = sh;
    const tctx = tmp.getContext('2d');
    tctx.fillStyle = '#ECEAE6'; tctx.fillRect(0,0,Wpx,sh);
    tctx.drawImage(cnv, 0, sy, Wpx, sh, 0, 0, Wpx, sh);
    const bin = atob(tmp.toDataURL('image/jpeg', 0.92).split(',')[1]);
    slices.push({ bin, w:Wpx, h:sh, hpt: sh/pxPerPt });
  });
  if(!slices.length){ // skal ikke skje, men aldri lever en PDF uten sider
    const sh = Hpx;
    const tmp = document.createElement('canvas'); tmp.width = Wpx; tmp.height = sh;
    const tctx = tmp.getContext('2d'); tctx.fillStyle = '#ECEAE6'; tctx.fillRect(0,0,Wpx,sh);
    tctx.drawImage(cnv, 0, 0, Wpx, sh, 0, 0, Wpx, sh);
    slices.push({ bin: atob(tmp.toDataURL('image/jpeg',0.92).split(',')[1]), w:Wpx, h:sh, hpt: sh/pxPerPt });
  }

  const objs=[]; const add=b=>{ objs.push(b); return objs.length; };
  slices.forEach(s => add(`<< /Type /XObject /Subtype /Image /Width ${s.w} /Height ${s.h} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${s.bin.length} >>\nstream\n${s.bin}\nendstream`));
  const firstContent = objs.length + 1;
  slices.forEach(s=>{
    const yB = (PH - M - s.hpt).toFixed(2);
    const c = `${BG} rg 0 0 ${PW.toFixed(2)} ${PH.toFixed(2)} re f q ${CWpt.toFixed(2)} 0 0 ${s.hpt.toFixed(2)} ${M.toFixed(2)} ${yB} cm /Im0 Do Q`;
    add(`<< /Length ${c.length} >>\nstream\n${c}\nendstream`);
  });
  const firstPage = objs.length + 1;
  const pagesNum = firstPage + slices.length;
  const catalogNum = pagesNum + 1;
  slices.forEach((s,i)=> add(`<< /Type /Page /Parent ${pagesNum} 0 R /MediaBox [0 0 ${PW} ${PH}] /Resources << /XObject << /Im0 ${1+i} 0 R >> >> /Contents ${firstContent+i} 0 R >>`));
  add(`<< /Type /Pages /Count ${slices.length} /Kids [${slices.map((_,i)=>`${firstPage+i} 0 R`).join(' ')}] >>`);
  add(`<< /Type /Catalog /Pages ${pagesNum} 0 R >>`);

  let pdf = '%PDF-1.4\n%\u00E2\u00E3\u00CF\u00D3\n';
  const offsets = [];
  objs.forEach((b,i)=>{ offsets[i] = pdf.length; pdf += `${i+1} 0 obj\n${b}\nendobj\n`; });
  const xref = pdf.length;
  pdf += `xref\n0 ${objs.length+1}\n0000000000 65535 f \n`;
  offsets.forEach(o => pdf += String(o).padStart(10,'0') + ' 00000 n \n');
  pdf += `trailer\n<< /Size ${objs.length+1} /Root ${catalogNum} 0 R >>\nstartxref\n${xref}\n%%EOF`;
  return pdfStringToBytes(pdf);
}

// Reserve: tegn KACH-designet som vektor (uten eksterne ressurser, virker overalt).
function vectorPDFBytes(){
  const data = getMilestones();
  if(!data){ alert('Velg en bryllupsdato først.'); return; }
  const couple = $('couple').value.trim();
  const place  = $('place').value.trim();

  // A4. Margene og innrykk gjenskaper skjermdesignet (skinne til venstre, innhold innrykket).
  const PW = 595.28, PH = 841.89, M = 56;
  const railX = M + 5;        // skinne + prikk
  const contentX = M + 32;    // innrykket innhold (som padding-left:48px på skjerm)
  const cardX = M, cardW = PW - 2*M;

  // KACH Weddings-palett (samme farger som tidslinjen), som RGB 0–1.
  const C = {
    ink:[0.102,0.094,0.086], inkSoft:[0.227,0.216,0.200], muted:[0.420,0.404,0.373],
    hairline:[0.847,0.831,0.804], rail:[0.788,0.769,0.737], surface:[0.965,0.957,0.945],
    field:[0.549,0.529,0.494], white:[1,1,1], bg:[0.925,0.918,0.902]
  };

  // Tekstbredde måles med canvas (Arial ≈ Helvetica, Times New Roman ≈ Times-Roman).
  const mc = document.createElement('canvas').getContext('2d');
  const FAM = {
    'Helvetica':'Arial, Helvetica, sans-serif', 'Helvetica-Bold':'Arial, Helvetica, sans-serif',
    'Helvetica-Oblique':'Arial, Helvetica, sans-serif', 'Times-Roman':'"Times New Roman", Times, serif',
    'Times-Bold':'"Times New Roman", Times, serif', 'Times-Italic':'"Times New Roman", Times, serif'
  };
  const BOLD = {'Helvetica-Bold':1,'Times-Bold':1};
  const ITAL = {'Helvetica-Oblique':1,'Times-Italic':1};
  function widthOf(s, font, size){
    mc.font = `${ITAL[font]?'italic ':''}${BOLD[font]?'bold ':''}${size}px ${FAM[font]}`;
    return mc.measureText(String(s)).width;
  }
  function lineW(s, font, size, tr){ return widthOf(s,font,size) + (tr||0)*(String(s).length-1); }
  function wrap(s, font, size, maxW, tr){
    const out = [];
    String(s).split('\n').forEach(par=>{
      const words = par.split(/\s+/).filter(Boolean);
      let cur = '';
      for(const w of words){
        const test = cur ? cur+' '+w : w;
        if(cur && lineW(test,font,size,tr) > maxW){ out.push(cur); cur = w; }
        else cur = test;
      }
      out.push(cur);
    });
    return out;
  }

  const FONT = {'Helvetica':'F1','Helvetica-Bold':'F2','Helvetica-Oblique':'F3','Times-Roman':'F4','Times-Bold':'F5','Times-Italic':'F6'};
  function escTxt(s){
    return String(s).split('').map(ch=>{
      if(ch.charCodeAt(0) > 255) return '?';   // hold oss innenfor WinAnsi
      if(ch==='\\'||ch==='('||ch===')') return '\\'+ch;
      return ch;
    }).join('');
  }
  const cf = c => `${c[0]} ${c[1]} ${c[2]} rg\n`;   // fyllfarge
  const cs_ = c => `${c[0]} ${c[1]} ${c[2]} RG\n`;  // strekfarge

  // Hver side har tre lag: back (skinne), mid (kort/merker-flater), front (tekst + prikker).
  const pages = [];
  let P = null, y = PH - M, inTL = false;
  function startPage(){ P = { back:'', mid:'', front:'', railTop:null, railBot:null }; pages.push(P); P.back += cf(C.bg) + `0 0 ${PW.toFixed(2)} ${PH.toFixed(2)} re f\n`; y = PH - M; }
  function finishRail(){
    if(inTL && P && P.railTop!=null){
      const top = P.railTop, bot = (P.railBot!=null ? P.railBot : y);
      if(top > bot) P.back += cs_(C.rail) + `1 w ${railX.toFixed(2)} ${top.toFixed(2)} m ${railX.toFixed(2)} ${bot.toFixed(2)} l S\n`;
    }
  }
  function room(h){
    if(y - h < M){ finishRail(); startPage(); if(inTL){ P.railTop = y; P.railBot = y; } }
  }
  function gap(h){ room(h); y -= h; }

  function text(buf, txt, x, yy, font, size, color, tr){
    let s = cf(color) + `BT /${FONT[font]} ${size} Tf `;
    if(tr) s += `${tr} Tc `;
    s += `${x.toFixed(2)} ${yy.toFixed(2)} Td (${escTxt(txt)}) Tj ET\n`;
    if(tr) s += `0 Tc\n`;
    P[buf] += s;
  }
  function rect(buf, x, yy, w, h, fillC, strokeC, lw){
    let s = '';
    if(fillC) s += cf(fillC);
    if(strokeC) s += cs_(strokeC) + `${lw||0.8} w\n`;
    s += `${x.toFixed(2)} ${yy.toFixed(2)} ${w.toFixed(2)} ${h.toFixed(2)} re ` + (fillC&&strokeC?'B\n':fillC?'f\n':'S\n');
    P[buf] += s;
  }
  function circle(buf, cx, cy, r, fillC, strokeC, lw){
    const k = 0.5523*r;
    let s = '';
    if(fillC) s += cf(fillC);
    if(strokeC) s += cs_(strokeC) + `${lw||0.8} w\n`;
    s += `${(cx+r).toFixed(2)} ${cy.toFixed(2)} m `
       + `${(cx+r).toFixed(2)} ${(cy+k).toFixed(2)} ${(cx+k).toFixed(2)} ${(cy+r).toFixed(2)} ${cx.toFixed(2)} ${(cy+r).toFixed(2)} c `
       + `${(cx-k).toFixed(2)} ${(cy+r).toFixed(2)} ${(cx-r).toFixed(2)} ${(cy+k).toFixed(2)} ${(cx-r).toFixed(2)} ${cy.toFixed(2)} c `
       + `${(cx-r).toFixed(2)} ${(cy-k).toFixed(2)} ${(cx-k).toFixed(2)} ${(cy-r).toFixed(2)} ${cx.toFixed(2)} ${(cy-r).toFixed(2)} c `
       + `${(cx+k).toFixed(2)} ${(cy-r).toFixed(2)} ${(cx+r).toFixed(2)} ${(cy-k).toFixed(2)} ${(cx+r).toFixed(2)} ${cy.toFixed(2)} c `
       + (fillC&&strokeC?'B\n':fillC?'f\n':'S\n');
    P[buf] += s;
  }
  function ruleC(w, color){
    room(8);
    P.front += cs_(color) + `0.7 w ${((PW-w)/2).toFixed(2)} ${y.toFixed(2)} m ${((PW+w)/2).toFixed(2)} ${y.toFixed(2)} l S\n`;
  }

  // Venstrejustert avsnitt (front-lag), med ev. sperret tekst.
  function para(s, font, size, color, opt){
    opt = opt || {};
    const lh = opt.lh || size*1.32;
    const x0 = opt.x!=null ? opt.x : contentX;
    const tr = opt.tracking || 0;
    const w  = opt.w!=null ? opt.w : (PW - M - x0);
    wrap(s, font, size, w, tr).forEach(ln=>{
      room(lh);
      const x = opt.align==='center' ? (PW - lineW(ln,font,size,tr))/2 : x0;
      text('front', ln, x, y - size*0.82, font, size, color, tr);
      y -= lh;
      if(inTL) P.railBot = y;
    });
  }

  // Tag-merke (rammet pille) i innholdskolonnen.
  function tagPill(tagText, isDay){
    const size = 7, padX = 7, padY = 4, h = size + padY*2;
    room(h + 5);
    const w = lineW(tagText, 'Helvetica', size, 1) + padX*2;
    rect('mid', contentX, y - h, w, h, null, isDay ? C.ink : C.hairline, 0.7);
    text('front', tagText, contentX + padX, y - h + padY + 0.5, 'Helvetica', size, isDay ? C.ink : C.muted, 1);
    y -= h + 7;
    if(inTL) P.railBot = y;
  }

  // Off-rail kort (parfoto / album) — fylt flate som dekker skinnen, med ramme.
  function renderCard(a, draw, topY){
    const padX = 16, innerW = cardW - padX*2;
    let cy = topY - 18;
    const put = (t, font, size, color, tr, lh) => { if(draw) text('front', t, cardX + padX, cy - size*0.78, font, size, color, tr||0); cy -= lh; };
    put(a.eyebrow.toUpperCase(), 'Helvetica-Bold', 7, C.muted, 1.4, 14);
    wrap(a.title, 'Times-Bold', 13, innerW, 0).forEach(l => put(l, 'Times-Bold', 13, C.ink, 0, 15));
    cy -= 2;
    wrap(a.desc, 'Helvetica', 9.5, innerW, 0).forEach(l => put(l, 'Helvetica', 9.5, C.muted, 0, 13));
    if(a.seasons && a.seasons.length){
      cy -= 4;
      wrap('Aktuelle årstider: ' + a.seasons.join(', '), 'Helvetica', 8.5, innerW, 0).forEach(l => put(l, 'Helvetica', 8.5, C.inkSoft, 0, 11));
    }
    if(a.note){
      cy -= 4;
      wrap(a.note, 'Helvetica-Oblique', 8.5, innerW, 0).forEach(l => put(l, 'Helvetica-Oblique', 8.5, C.inkSoft, 0, 11));
    }
    return topY - cy; // forbrukt høyde fra topY
  }
  function aside(a){
    gap(8);
    const need = renderCard(a, false, 1000); // = 1000 - cyFinal = forbrukt høyde (måling, uten tegning)
    const boxH = need + 12;
    room(boxH + 6);
    const topY = y;
    rect('mid', cardX, topY - boxH, cardW, boxH, C.surface, C.hairline, 0.8);
    renderCard(a, true, topY);
    y = topY - boxH;
    if(inTL) P.railBot = y;
    gap(16);
  }

  // ---------- Bygg dokumentet ----------
  startPage();

  // Header / wordmark
  para('KACH Weddings', 'Times-Roman', 22, C.ink, {align:'center', tracking:3, lh:26});
  gap(4);
  para('TIDSLINJE FOR BRYLLUPSDAGEN', 'Helvetica', 8, C.muted, {align:'center', tracking:2.4, lh:12});
  gap(24);

  // Tidslinje-header (par + meta + strek)
  para(couple || 'Deres tidslinje', 'Times-Roman', 27, C.ink, {align:'center', lh:30});
  gap(6);
  const meta = [fmtDate(data.W)]; if(place) meta.push(place);
  para(meta.join('     ·     '), 'Helvetica', 9, C.muted, {align:'center', tracking:1.6, lh:13});
  gap(12);
  ruleC(46, C.ink);
  gap(30);

  // Tidslinjen (med skinne)
  inTL = true; P.railTop = y; P.railBot = y;
  let lastPhase = null;
  data.rows.forEach(r=>{
    if(r.phase !== lastPhase){
      gap(12);
      para(r.phase.toUpperCase(), 'Helvetica-Bold', 8.5, C.muted, {x:contentX, tracking:1.8, lh:13});
      gap(8);
      lastPhase = r.phase;
      if(r.phase === 'Planlegging') aside(parfotoAside());
    }
    room(64);
    const markerCY = y - 6;                       // prikk på skinnen, på linje med toppen av kortet
    circle('front', railX, markerCY, 3.4,
           r.isDay ? C.ink : C.bg,
           r.isDay ? C.ink : (r.isPast ? C.rail : C.ink), 0.9);

    tagPill((r.tag || '').toUpperCase(), r.isDay);
    para(r.dateLabel, 'Times-Roman', r.isDay ? 18 : (r.isBooking ? 15 : 16.5), C.ink, {x:contentX, lh: (r.isDay?20:18)});
    if(r.weekday) para(r.weekday.toUpperCase(), 'Helvetica', 7.5, C.muted, {x:contentX, tracking:1, lh:12});
    gap(4);
    para(r.title, 'Times-Bold', r.isDay ? 15 : 13, C.ink, {x:contentX, lh: (r.isDay?17:15)});
    gap(2);
    if(r.desc) para(r.desc, 'Helvetica', 9.5, C.inkSoft, {x:contentX, lh:13.5});
    if(r.who){ gap(2); para(r.who, 'Helvetica-Oblique', 8.5, C.muted, {x:contentX, lh:11.5}); }
    gap(16);
    if(r.key === 'gallery') aside(albumAside());
  });
  finishRail();
  inTL = false;

  // Bunntekst (med topplinje)
  gap(14);
  P.front += cs_(C.hairline) + `0.8 w ${M.toFixed(2)} ${y.toFixed(2)} m ${(PW-M).toFixed(2)} ${y.toFixed(2)} l S\n`;
  gap(20);
  para('Gleder meg til å forevige deres store dag', 'Times-Italic', 13, C.ink, {align:'center', lh:16});
  gap(6);
  para('www.kachweddings.no', 'Helvetica', 8, C.muted, {align:'center', tracking:2, lh:11});

  // ---------- Bygg PDF-objekter ----------
  const pageContents = pages.map(p => p.back + p.mid + p.front);
  const objs = [];
  const add = body => { objs.push(body); return objs.length; };
  ['Helvetica','Helvetica-Bold','Helvetica-Oblique','Times-Roman','Times-Bold','Times-Italic']
    .forEach(fn => add(`<< /Type /Font /Subtype /Type1 /BaseFont /${fn} /Encoding /WinAnsiEncoding >>`));
  const resFonts = ['F1','F2','F3','F4','F5','F6'].map((f,i)=>`/${f} ${i+1} 0 R`).join(' ');
  const resources = `<< /Font << ${resFonts} >> >>`;

  const firstContent = 7;
  const firstPage = firstContent + pageContents.length;
  const pagesNum = firstPage + pageContents.length;
  const catalogNum = pagesNum + 1;

  pageContents.forEach(content => add(`<< /Length ${content.length} >>\nstream\n${content}endstream`));
  pageContents.forEach((_,i)=> add(`<< /Type /Page /Parent ${pagesNum} 0 R /MediaBox [0 0 ${PW} ${PH}] /Resources ${resources} /Contents ${firstContent+i} 0 R >>`));
  add(`<< /Type /Pages /Count ${pageContents.length} /Kids [${pageContents.map((_,i)=>`${firstPage+i} 0 R`).join(' ')}] >>`);
  add(`<< /Type /Catalog /Pages ${pagesNum} 0 R >>`);

  let pdf = '%PDF-1.4\n%\u00E2\u00E3\u00CF\u00D3\n';
  const offsets = [];
  objs.forEach((body,i)=>{ offsets[i] = pdf.length; pdf += `${i+1} 0 obj\n${body}\nendobj\n`; });
  const xref = pdf.length;
  pdf += `xref\n0 ${objs.length+1}\n0000000000 65535 f \n`;
  offsets.forEach(o => { pdf += String(o).padStart(10,'0') + ' 00000 n \n'; });
  pdf += `trailer\n<< /Size ${objs.length+1} /Root ${catalogNum} 0 R >>\nstartxref\n${xref}\n%%EOF`;

  return pdfStringToBytes(pdf);
}

function showPdfOverlay(url, fname){
  const old = document.getElementById('pdfOverlay');
  if(old) old.remove();

  const ov = document.createElement('div');
  ov.id = 'pdfOverlay';
  ov.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(26,24,22,.55);display:flex;flex-direction:column;padding:20px;box-sizing:border-box;';

  const bar = document.createElement('div');
  bar.style.cssText = 'display:flex;gap:12px;align-items:center;justify-content:space-between;background:#F6F4F1;border:1px solid #D8D4CD;padding:12px 16px;border-radius:8px 8px 0 0;flex:0 0 auto;';
  const title = document.createElement('span');
  title.textContent = 'Forhåndsvisning av PDF';
  title.style.cssText = 'font-family:Montserrat,system-ui,sans-serif;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#1A1816;';
  const btns = document.createElement('div');
  btns.style.cssText = 'display:flex;gap:8px;align-items:center;flex-wrap:wrap;';
  const dl = document.createElement('a');
  dl.href = url; dl.download = fname; dl.textContent = 'Last ned';
  dl.style.cssText = 'font-family:Montserrat,system-ui,sans-serif;font-size:13px;text-decoration:none;background:#1A1816;color:#F6F4F1;padding:8px 18px;border-radius:4px;';
  const open = document.createElement('a');
  open.href = url; open.target = '_blank'; open.rel = 'noopener'; open.textContent = 'Åpne i ny fane';
  open.style.cssText = 'font-family:Montserrat,system-ui,sans-serif;font-size:13px;text-decoration:none;background:transparent;border:1px solid #8C877E;color:#1A1816;padding:8px 18px;border-radius:4px;';
  const close = document.createElement('button');
  close.type = 'button'; close.textContent = 'Lukk';
  close.style.cssText = 'font-family:Montserrat,system-ui,sans-serif;font-size:13px;background:transparent;border:1px solid #8C877E;color:#1A1816;padding:8px 18px;border-radius:4px;cursor:pointer;';
  close.addEventListener('click', () => { ov.remove(); try{ URL.revokeObjectURL(url); }catch(e){} });
  btns.appendChild(dl); btns.appendChild(open); btns.appendChild(close);
  bar.appendChild(title); bar.appendChild(btns);

  const hint = document.createElement('div');
  hint.textContent = 'Tips: hvis «Last ned» ikke gjør noe, bruk lagre- eller utskriftsknappen i PDF-visningen under, eller «Åpne i ny fane».';
  hint.style.cssText = 'font-family:Montserrat,system-ui,sans-serif;font-size:11px;color:#6B675F;background:#F6F4F1;border:1px solid #D8D4CD;border-top:none;padding:8px 16px;flex:0 0 auto;';

  const frame = document.createElement('iframe');
  frame.src = url; frame.title = 'PDF';
  frame.style.cssText = 'flex:1 1 auto;width:100%;border:1px solid #D8D4CD;border-top:none;border-radius:0 0 8px 8px;background:#fff;min-height:0;';

  ov.appendChild(bar); ov.appendChild(hint); ov.appendChild(frame);
  document.body.appendChild(ov);
}

// ---------- Lagring av sist inntastede info + tilbakestilling ----------
const STORAGE_KEY = 'kachweddings-tidslinje-v1';
const FIELD_IDS  = ['couple','wdate','bdate','place','delw','sendDays','termDays','finalOverride'];
const TOGGLE_IDS = ['tEngage','tAlbum'];

function defaultState(){
  return {
    couple:'', wdate:(new Date().getFullYear()+1)+'-06-01', bdate:'', place:'',
    delw:'4', sendDays:'1', termDays:'10', finalOverride:'',
    tEngage:false, tAlbum:false
  };
}
function applyState(s){
  FIELD_IDS.forEach(id => { if(id in s) $(id).value = s[id]; });
  TOGGLE_IDS.forEach(id => { if(id in s) $(id).checked = !!s[id]; });
}
function collectState(){
  const s = {};
  FIELD_IDS.forEach(id => s[id] = $(id).value);
  TOGGLE_IDS.forEach(id => s[id] = $(id).checked);
  return s;
}
function saveState(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(collectState())); } catch(e){}
}
function loadState(){
  try { const raw = localStorage.getItem(STORAGE_KEY); if(raw) return JSON.parse(raw); } catch(e){}
  return null;
}
function resetState(){
  try { localStorage.removeItem(STORAGE_KEY); } catch(e){}
  applyState(defaultState());
  render();
}
function update(){ render(); saveState(); }

$('genBtn').addEventListener('click', render);
$('pdfBtn').addEventListener('click', exportPDF);
$('csvBtn').addEventListener('click', downloadCSV);
$('resetBtn').addEventListener('click', resetState);
FIELD_IDS.concat(TOGGLE_IDS).forEach(id => {
  $(id).addEventListener('change', update);
});

// Last inn sist lagrede info; manglende felt fylles med standardverdier.
applyState(Object.assign(defaultState(), loadState() || {}));
render();
</script>

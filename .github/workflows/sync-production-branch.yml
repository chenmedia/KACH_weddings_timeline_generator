# Keeps the Vercel production branch in sync with `main`.
#
# Why this exists: this project's Vercel "Production Branch" is set to
# `claude/sweet-johnson-vaotlr`, not `main`. So a push to `main` does NOT
# deploy to production on its own. This workflow fast-forwards the production
# branch to `main` on every push, which makes Vercel build & promote a
# production deployment automatically.
#
# Long-term cleanup: change the Vercel Production Branch to `main`
# (Settings -> Git -> Production Branch), then delete this workflow and the
# `claude/sweet-johnson-vaotlr` branch. Until then, `main` is the single
# source of truth and this keeps production tracking it.
name: Sync production branch

on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid concurrent pushes racing the production branch.
concurrency:
  group: sync-production-branch
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # Fast-forward only: if the production branch has diverged from `main`
      # (e.g. someone pushed to it directly), this fails loudly instead of
      # clobbering history. The production branch should only ever move via
      # this workflow, so it stays a descendant of `main`.
      - name: Fast-forward production branch to main
        run: git push origin "HEAD:claude/sweet-johnson-vaotlr"

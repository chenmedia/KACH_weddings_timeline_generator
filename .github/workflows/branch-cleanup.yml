name: Cleanup branches (one-shot)

# Manually-triggered housekeeping. Runs on GitHub's runner with the Actions
# token (contents: write), bypassing the local push proxy. Deleted after use.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Delete branches
        run: |
          set +e
          for b in \
            claude/sweet-johnson-vaotlr \
            claude/home-ux; do
            echo "Deleting $b"
            git push origin --delete "$b" || echo "  (skip: $b not found or already deleted)"
          done
